---
- name: Automation of monitoring and logging on NGINX
  hosts: all
  become: true
  vars:
    loki_host_ip: "192.168.0.105" 
    node_exporter_version: "1.7.0"
    nginx_exporter_version: "1.1.0"
    promtail_version: "2.9.2"

  tasks:
    - name: Add configuration nginx_status for metrics
      copy:
        dest: /etc/nginx/sites-available/status.conf
        content: |
          server {
              listen 127.0.0.1:80;
              server_name localhost;
              location /nginx_status {
                  stub_status on;
                  allow 127.0.0.1;
                  deny all;
              }
          }
      notify: Restart Nginx

    - name: Create symlink for enabling status.conf
      file:
        src: /etc/nginx/sites-available/status.conf
        dest: /etc/nginx/sites-enabled/status.conf
        state: link
      notify: Restart Nginx

    - name: Download Node Exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /tmp/node_exporter.tar.gz

    - name: Extract Node Exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp
        remote_src: true

    - name: Copy binary Node Exporter в /usr/local/bin
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        mode: '0755'
        remote_src: true

    - name: Create systemd demon for Node Exporter
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=root
          ExecStart=/usr/local/bin/node_exporter
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Enabling and executing Node Exporter
      systemd:
        name: node_exporter
        state: started
        enabled: true
        daemon_reload: true

    - name: Downloading Nginx Prometheus Exporter
      get_url:
        url: "https://github.com/nginxinc/nginx-prometheus-exporter/releases/download/v{{ nginx_exporter_version }}/nginx-prometheus-exporter_{{ nginx_exporter_version }}_linux_amd64.tar.gz"
        dest: /tmp/nginx_exporter.tar.gz

    - name: Extracting Nginx Exporter
      unarchive:
        src: /tmp/nginx_exporter.tar.gz
        dest: /tmp
        remote_src: true

    - name: Copy binary Nginx Exporter в /usr/local/bin
      copy:
        src: /tmp/nginx-prometheus-exporter
        dest: /usr/local/bin/nginx-prometheus-exporter
        mode: '0755'
        remote_src: true

    - name: Create systemd demon for Nginx Exporter
      copy:
        dest: /etc/systemd/system/nginx_exporter.service
        content: |
          [Unit]
          Description=NGINX Prometheus Exporter
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/nginx-prometheus-exporter -nginx.scrape-uri=http://127.0.0.1/nginx_status
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Enabling and executing Nginx Exporter
      systemd:
        name: nginx_exporter
        state: started
        enabled: true
        daemon_reload: true

    - name: Download Promtail
      get_url:
        url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
        dest: /tmp/promtail.zip

    - name: Download unzip (we need that to unzip promtail)
      apt:
        name: unzip
        state: present

    - name: Unzip Promtail
      unarchive:
        src: /tmp/promtail.zip
        dest: /usr/local/bin
        remote_src: true

    - name: Rename binary Promtail
      shell: mv /usr/local/bin/promtail-linux-amd64 /usr/local/bin/promtail
      args:
        removes: /usr/local/bin/promtail-linux-amd64
        creates: /usr/local/bin/promtail

    - name: Create directory for Promtail configuration
      file:
        path: /etc/promtail
        state: directory

    - name: Generate Promtail configuration from template Jinja2
      template:
        src: templates/promtail-config.yml.j2
        dest: /etc/promtail/promtail-config.yml

    - name: Create systemd daemon for Promtail
      copy:
        dest: /etc/systemd/system/promtail.service
        content: |
          [Unit]
          Description=Promtail service
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/promtail-config.yml
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Enabling and executing Promtail
      systemd:
        name: promtail
        state: started
        enabled: true
        daemon_reload: true

  handlers:
    - name: Restart Nginx
      systemd:
        name: nginx
        state: restarted