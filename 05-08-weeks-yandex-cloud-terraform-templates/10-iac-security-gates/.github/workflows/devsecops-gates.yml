name: "DevSecOps IaC Security Gates"

on:
  pull_request:
    branches: [ "feature/enterprise-pipeline", "main" ]
  push:
    branches: [ "feature/enterprise-pipeline" ]

jobs:
  security_gates:
    name: "IaC Static Analysis & Security Gates"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup TFLint
      uses: terraform-linters/setup-tflint@v3
      with:
        tflint_version: v0.48.0

    - name: Run TFLint
      run: |
        tflint --init
        tflint -f compact

    - name: Run Trivy IaC Scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        hide-progress: true
        format: 'table'
        exit-code: '1' 
        severity: 'HIGH,CRITICAL'

  deploy:
    name: "Terraform Deployment"
    needs: security_gates 
    runs-on: ubuntu-latest
    env:
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Yandex Cloud Auth
      uses: yc-actions/yc-auth-setup@v1
      with:
        service_account_key: ${{ secrets.YC_SA_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Init & Apply
      run: |
        terraform init
        terraform workspace select dev || terraform workspace new dev
        terraform apply -auto-approve