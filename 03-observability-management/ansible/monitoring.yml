---
- name: Monitoring Setup
  hosts: webservers
  become: true

  tasks:
    - name: Ensure Node Exporter is installed
      ansible.builtin.apt:
        name: prometheus-node-exporter
        state: present
        update_cache: true

    - name: Ensure Node Exporter is enabled and running
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        state: started
        enabled: true

    - name: Verify Node Exporter is listening on port 9100
      ansible.builtin.wait_for:
        port: 9100
        timeout: 10
