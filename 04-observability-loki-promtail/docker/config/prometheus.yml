global:
  scrape_interval: 15s 
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ubuntu-node-exporter'
    static_configs:
      - targets: ['192.168.0.112:9100'] 

  - job_name: 'nginx-exporter'
    static_configs:
      - targets: ['192.168.0.112:9113'] 