---
- name: Monitoring Setup
  hosts: webservers
  become: true

  tasks:
    - name: Ensure Node Exporter is installed
      ansible.builtin.apt:
        name: prometheus-node-exporter
        state: present
        update_cache: true

    - name: Ensure Node Exporter is enabled and running
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        state: started
        enabled: true

    - name: Verify Node Exporter is listening on port 9100
      ansible.builtin.wait_for:
        port: 9100
        timeout: 10

    - name: Ensure Prometheus is installed
      ansible.builtin.apt:
        name: prometheus
        state: present

    - name: Configure Prometheus to scrape Node Exporter
      ansible.builtin.copy:
        dest: /etc/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'webservers'
              static_configs:
                - targets: ['localhost:9100']
        mode: '0644'
      notify: Restart Prometheus

    - name: Ensure Grafana is installed
      ansible.builtin.apt:
        name: grafana
        state: present
        update_cache: true

    - name: Ensure Grafana service is started and enabled
      ansible.builtin.systemd:
        name: grafana-server
        state: started
        enabled: true

  handlers:
    - name: Restart Prometheus
      ansible.builtin.systemd:
        name: prometheus
        state: restarted
