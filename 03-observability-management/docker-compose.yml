version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.53.3
    container_name: local-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: local-grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
  