---
- name: Monitoring Setup on VirtualBox from Windows
  hosts: webservers
  become: true

  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - wget
          - curl
          - tar
        state: present
        update_cache: true

    - name: Ensure Node Exporter is installed
      ansible.builtin.apt:
        name: prometheus-node-exporter
        state: present

    - name: Ensure Node Exporter is enabled and running
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        state: started
        enabled: true

    - name: Download Prometheus binary archive
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/prometheus/releases/download/v2.53.3/prometheus-2.53.3.linux-amd64.tar.gz"
        dest: "/tmp/prometheus.tar.gz"
        mode: '0644'

    - name: Create Prometheus directory
      ansible.builtin.file:
        path: /etc/prometheus
        state: directory
        mode: '0755'

    - name: Extract Prometheus binary
      ansible.builtin.unarchive:
        src: "/tmp/prometheus.tar.gz"
        dest: "/tmp"
        remote_src: true

    - name: Copy Prometheus binaries to /usr/local/bin
      ansible.builtin.copy:
        src: "/tmp/prometheus-2.53.3.linux-amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: '0755'
        remote_src: true
      loop:
        - prometheus
        - promtool

    - name: Configure Prometheus
      ansible.builtin.copy:
        dest: /etc/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'virtualbox-nginx'
              static_configs:
                - targets: ['localhost:9100']
        mode: '0644'

    - name: Create Systemd service unit for Prometheus
      ansible.builtin.copy:
        dest: /etc/systemd/system/prometheus.service
        content: |
          [Unit]
          Description=Prometheus
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=root
          ExecStart=/usr/local/bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/var/lib/prometheus/

          [Install]
          WantedBy=multi-user.target
        mode: '0644'

    - name: Ensure Prometheus service is started and enabled
      ansible.builtin.systemd:
        name: prometheus
        state: started
        enabled: true
        daemon_reload: true

    - name: Download Grafana deb package directly
      ansible.builtin.get_url:
        url: "https://dl.grafana.com/oss/release/grafana_11.0.0_amd64.deb"
        dest: "/tmp/grafana_11.0.0_amd64.deb"
        mode: '0644'
        http_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

    - name: Install Grafana from local deb package
      ansible.builtin.apt:
        deb: "/tmp/grafana_11.0.0_amd64.deb"

    - name: Ensure Grafana service is started and enabled
      ansible.builtin.systemd:
        name: grafana-server
        state: started
        enabled: true
