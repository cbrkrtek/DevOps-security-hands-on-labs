name: "Terraform GitOps Pipeline"

on:
  pull_request:
    branches: [ "feature/enterprise-pipeline", "main" ]
  push:
    branches: [ "feature/enterprise-pipeline" ]

jobs:
  terraform:
    name: "Terraform Automation"
    runs-on: ubuntu-latest

    #create vars for cloud folder ID , key ID, SECRET KEY    
    env:
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Yandex Cloud Alpha Auth
      uses: yc-actions/yc-auth-setup@v1
      with:
        service_account_key: ${{ secrets.YC_SA_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Init
      run: terraform init

    - name: Terraform Workspace Select
      run: terraform workspace select dev || terraform workspace new dev

    - name: Terraform Plan
      id: plan
      if: github.event_name == 'pull_request'
      run: terraform plan -no-color -out=tfplan
      continue-on-error: true

    - name: Update Pull Request with Plan Result
      uses: actions/github-script@v6
      if: github.event_name == 'pull_request'
      with:
        script: |
          const output = `#### Terraform Format and Style 🖌
          #### Terraform Initialization ⚙️
          #### Terraform Plan 🚀
          
          \`\`\`text
          Plan executed successfully. Review the infrastructure modifications in the pipeline logs.
          \`\`\`
          
          *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })

    - name: Terraform Apply
      if: github.event_name == 'push'
      run: terraform apply -auto-approve