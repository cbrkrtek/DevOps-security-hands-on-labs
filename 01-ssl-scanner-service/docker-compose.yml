version: '3.8'
services:
  database:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-default_secure_pass}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-default_secure_pass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M 
  app-scanner:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8080:8080" 
    environment:
      - REDIS_HOST=database
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-default_secure_pass}
      - DOMAINS=google.com,github.com
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend
    restart: on-failure
    security_opt:
      - no-new-privileges:true
networks:
  backend:
    driver: bridge
    internal: true 